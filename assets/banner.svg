<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2027;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#203a43;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c5364;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#bgGradient)" rx="15" />

  <!-- Name -->
  <text x="600" y="110" font-family="Arial, sans-serif" font-size="60" fill="#00F7FF" text-anchor="middle" font-weight="bold" letter-spacing="2">
    ATHARV HOLKAR
  </text>

  <!-- Title -->
  <text x="600" y="160" font-family="Arial, sans-serif" font-size="28" fill="#FFFFFF" text-anchor="middle">
    Full Stack Developer | Creative Technologist
  </text>

  <!-- Tagline -->
  <text x="600" y="210" font-family="Arial, sans-serif" font-size="22" fill="#80FFFF" text-anchor="middle">
    Founder of Athinyx 🚀
  </text>

  <!-- Decorative line -->
  <line x1="400" y1="180" x2="800" y2="180" stroke="#00F7FF" stroke-width="2" />
</svg>
