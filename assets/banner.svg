<rect width="1200" height="320" fill="#fcfcfc"/>
<style>
.t{font-family:"Comic Sans MS","Segoe Print",cursive;fill:#334;}
.p{fill:#5b3fd6}.b{fill:#2d7ff9}
.code{font-size:24px}.small{font-size:18px}.title{font-size:34px;font-weight:bold}
line,path,rect,circle{stroke:#8b5cf6;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.blue{stroke:#3b82f6}
</style>

<text x="70" y="45" class="t code p">#include &lt;iostream&gt;</text>
<text x="70" y="75" class="t code b">using namespace std;</text>

<text x="70" y="120" class="t code p">class Animal {</text>
<text x="100" y="150" class="t code b">public:</text>
<text x="130" y="180" class="t code">virtual void speak(){</text>
<text x="170" y="210" class="t code b">cout &lt;&lt; "Animal";</text>
<text x="130" y="240" class="t code">}</text>
<text x="70" y="270" class="t code p">};</text>

<text x="350" y="120" class="t code p">class Dog : public Animal {</text>
<text x="380" y="150" class="t code b">void speak() override {</text>
<text x="420" y="180" class="t code">cout &lt;&lt; "Dog";</text>
<text x="380" y="210" class="t code">}</text>
<text x="350" y="240" class="t code p">};</text>

<rect x="760" y="30" width="250" height="55" rx="4"/>
<text x="795" y="67" class="t title p">POLYMORPHISM</text>
<text x="790" y="115" class="t small b">One interface, multiple forms.</text>

